name: 每日財經簡報（雲端分析）

# 本機 launchd 抓字幕並 push data/latest_transcript.txt 後，
# 此 workflow 自動偵測到變更，於雲端跑 Gemini 分析並產出 HTML。
on:
  push:
    paths:
      - "data/latest_transcript.txt"
  workflow_dispatch:   # 也可手動觸發（用 repo 內現有字幕重跑分析）

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Gemini analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/daily_briefing.py analyze
