name: 每日財經簡報

on:
  schedule:
    - cron: "10 1 * * 1-5"   # UTC 01:10 = 台北時間 09:10 平日
  workflow_dispatch:           # 支援手動觸發

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yt-dlp[default]" google-genai youtube-transcript-api

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Write YouTube cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/yt_cookies.txt

      - name: Run daily briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_COOKIES_FILE: /tmp/yt_cookies.txt
        run: python scripts/daily_briefing.py
